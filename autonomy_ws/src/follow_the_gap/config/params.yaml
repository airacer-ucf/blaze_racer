follow_the_gap_node:
  ros__parameters:
    # Forward field of view actually used by the planner (degrees). The Hokuyo
    # sweeps ~270 deg; we only steer from the front portion.
    fov_degrees: 270.0

    # Index-based tunables. These are measured in scan beams and are evaluated
    # AFTER the FOV crop, so they depend on the LiDAR resolution and on
    # fov_degrees. Re-tune them if either changes.
    bubble_radius: 175
    preprocess_conv_size: 3
    safe_threshold: 30
    best_point_conv_size: 200

    max_lidar_dist: 10.0

    # Steering: bearing-to-steering gain and the mechanical limit (radians).
    steering_gain: 0.5
    max_steer: 0.349066          # 20 deg

    # Speed banding by steering magnitude (radians / metres-per-second).
    straights_steering_angle: 0.1396  # 8 deg
    fast_steering_angle: 0.0698       # 4 deg
    corners_speed: 1.5
    straights_speed: 3.0
    fast_speed: 4.5

    # --- Distance-based speed mode ---
    # When use_distance_speed is true, speed is determined by the average range
    # of beams within front_angle_width radians of straight ahead (0 rad):
    # closer obstacles → slower, farther obstacles → faster.
    # The steering-magnitude banding above is ignored in this mode.
    use_distance_speed: true
    front_angle_width: 0.1745    # 10 deg window centred on 0 rad
    dist_min_speed: 1.0          # clearance (m) that maps to distance_min_speed
    dist_max_speed: 5.0          # clearance (m) that maps to distance_max_speed
    distance_min_speed: 1.5      # slowest speed (m/s) used in distance mode
    distance_max_speed: 4.5      # fastest speed (m/s) used in distance mode

    status_interval: 1.0  # seconds between terminal status messages
