# slam_toolbox (online async) configuration for the blaze_racer track mapping.
#
# Tuned for the REAL car's frames as published by the subsystem stack:
#   odom_frame = odom, base_frame = base_link  (see subsystem_stack/config/vesc.yaml
#   and the base_link -> laser static TF in bringup_launch.py).
# When mapping in the F1TENTH simulator instead, override the frames below to
# the sim's ego_racecar/* frames (e.g. via a separate params file).
#
# Loop closing is ON: it is what straightens the map when the car completes a
# lap, and it pairs with the loop_closure_map_saver node that saves the map
# at that moment.

slam_toolbox:
  ros__parameters:

    # Solver plugin (Ceres) for pose-graph optimisation.
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Frames and input topic (real car).
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping            # mapping | localization

    # Runtime behaviour.
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02   # 50 Hz map->odom TF
    map_update_interval: 2.0         # publish /map every 2 s
    resolution: 0.05                 # metres per pixel
    max_laser_range: 10.0            # clamp Hokuyo returns used for mapping
    minimum_time_interval: 0.5
    # Tolerate brief odom TF lag (e.g. under CPU load on the Jetson).
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # Only process a new scan after this much motion (keeps the graph compact).
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5

    # Loop closure.
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation (scan matching) search space.
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Correlation search space for loop closure.
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan matcher penalties / resolution.
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # Optimise the graph periodically.
    optimize_every_n_nodes: 20
